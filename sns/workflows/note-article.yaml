# SNS Workflow: note Article (auto publish)
name: sns-note-article
version: 1.2
description: note記事の生成→Slackレビュー（例外介入）→予約公開まで工場化（NocoDBはミラー）
content_type: note_article
max_iterations: 18
initial_step: seed_discovery

steps:
  - name: seed_discovery
    agent: orchestrator
    edit: false
    rules:
      - condition: Seed selected
        next: structure_design
    instruction_template: |
      Choose seed (from story-driven dispatch or X article winners).
      Save to `_codex/sns/log/dispatch_plan_YYYY-MM-DD.md` if scheduled.

  - name: structure_design
    agent: .claude/skills/note-smart/agents/phase1_structure.md
    edit: false
    rules:
      - condition: Structure complete
        next: draft_creation
    instruction_template: |
      Create note structure per note-smart.
      Save to `_codex/sns/drafts/note_{story_id}_structure.md`.

  - name: draft_creation
    agent: .claude/skills/note-smart/agents/phase2_draft.md
    edit: false
    rules:
      - condition: Draft created
        next: editor_review
    instruction_template: |
      Write 2,500-3,000 chars draft.
      Save to `_codex/sns/drafts/note_{story_id}_draft.md`.

  - name: editor_review
    agent: .claude/skills/note-smart/agents/phase2_5_review.md
    edit: false
    rules:
      - condition: Score >= 80
        next: finalize
      - condition: Score < 80
        next: draft_creation
    instruction_template: |
      Run note-smart editor review; ensure score >= 80.
      Save to `_codex/sns/drafts/note_{story_id}_reviewed.md`.

  - name: finalize
    agent: .claude/skills/note-smart/agents/phase3_finalize.md
    edit: false
    rules:
      - condition: Finalized
        next: queue_review
    instruction_template: |
      Finalize with cover prompt & meta.
      Save to `_codex/sns/drafts/note_{story_id}_final.md`.

  - name: queue_review
    agent: orchestrator
    edit: false
    rules:
      - condition: Review queued
        next: sync_nocodb_mirror
    instruction_template: |
      Copy note final to `_codex/sns/x/05_posts/review/note_{story_id}.md`
      with frontmatter: type=note story_stage=note status=review source_path.

  - name: sync_nocodb_mirror
    agent: orchestrator
    edit: false
    rules:
      - condition: Synced
        next: slack_review_notify
    instruction_template: |
      Sync review queue to NocoDB:
      - python3 _codex/sns/x/ops/scripts/sync_review_queue.py
      NocoDB is NOT an approval gate. Slack buttons are the only exception controls.

  - name: slack_review_notify
    agent: orchestrator
    edit: false
    rules:
      - condition: Review notified
        next: exception_handling
    instruction_template: |
      Post review card to Slack (for exception handling):
      - GitHub Actions: `.github/workflows/sns-review-queue.yml`
      - or local: python3 _codex/sns/x/ops/scripts/slack_review_queue.py

  - name: exception_handling
    agent: orchestrator
    edit: false
    rules:
      - condition: Exception handled or not needed
        next: shipping
    instruction_template: |
      If changes are needed, use Slack buttons:
      - approve / reject / edit / reschedule
      Relay -> `.github/workflows/sns-review-action.yml` -> apply_slack_review_action.py
      Updates: scheduled_posts.yml / md / dispatch plan / run_ledger

  - name: shipping
    agent: orchestrator
    edit: false
    rules:
      - condition: Published
        next: performance_analysis
    instruction_template: |
      Shipping is done by scheduler:
      - python3 _codex/common/ops/scripts/scheduled_post_runner.py --schedule-file _codex/sns/scheduled_posts.yml
      (internally calls note_post.py)

  - name: performance_analysis
    agent: orchestrator
    edit: false
    rules:
      - condition: Metrics recorded
        next: COMPLETE
    instruction_template: |
      Record PV/likes to `_codex/sns/note_log.md` (weekly) and metrics.md.
