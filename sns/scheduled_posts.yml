- id: fundamental-bottleneck
  scheduled_at: '2026-01-15T21:00:00+09:00'
  type: fundamental
  title: 自分がボトルネックになる問題
  body: '複数事業を回すことの弊害


    「自分がボトルネックになってしまう」


    担当者がいないと判断ができない

    自分しか知らない情報がある

    連絡を返せない期間が長くなると、事業がストップ


    これ、マジでヤバい


    だから俺はbrainbaseを作った

    だからAI PMのmanaを作ってる


    「俺がいなくても回る」状態を作る


    経営者が現場にいないと回らない会社は脆い


    自分がボトルネックになってる自覚、ある人いる？

    '
  status: posted
  posted_at: '2026-01-15T21:15:22.898659+09:00'
  posted_url: https://x.com/i/web/status/2011774206095343875
- id: 100day-day15
  scheduled_at: '2026-01-16T09:00:00+09:00'
  type: 100day_challenge
  day: 15
  title: 会議のアジェンダ自動作成
  body: '会議の準備で30分使うのがバカらしくなった


    だから会議のアジェンダ自動作成を実装した


    Before: 前回の議事録を見ながら手動で作成

    After: 前回の宿題＋今週のトピックを自動抽出


    なぜこれが必要か？

    → 準備に時間を使うより、会議本番に集中したいから


    会議の価値は「準備時間」じゃなくて「議論の質」


    累計: 21個/100個完了

    残り: 85日


    会議準備、どれくらい時間かけてる？

    '
  image: ~/workspace/brainbase-config/sns/images/100day_day15.jpg
  status: posted
  posted_at: '2026-01-18T21:26:00+09:00'
