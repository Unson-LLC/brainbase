- id: fundamental-time-priority
  scheduled_at: '2026-01-16T12:00:00+09:00'
  type: fundamental
  title: 時間の使い方の優先順位
  body: '俺の時間の優先順位


    1. 家族（娘との時間）

    2. 思考（判断・意思決定）

    3. 創造（新しいものを作る）

    4. 作業（ルーティン）


    4番を限りなくゼロにしたい

    だから自動化する


    「忙しい」が口癖の経営者

    大体、4番に時間を取られてる


    時間は有限

    何に使うかで人生が決まる


    「今日1日、何に一番時間を使った？」


    この問いに「家族」「思考」って答えられる日を増やしたい


    みんなの優先順位、どうなってる？

    '
  status: posted
  posted_at: '2026-01-16T11:48:25.008701+09:00'
  posted_url: https://x.com/i/web/status/2011993912865648652
- id: fundamental-delegation
  scheduled_at: '2026-01-16T21:00:00+09:00'
  type: fundamental
  title: 人に任せることの難しさ
  body: '「人に任せる」って言うのは簡単


    でも実際やると、めちゃくちゃ難しい


    「自分でやった方が早い」

    「説明する時間がもったいない」

    「クオリティが担保できない」


    全部わかる

    俺も同じこと思ってた


    でも、それを続けると自分がボトルネックになる


    任せるコツは「完璧を求めない」こと


    70%の出来でOKにする

    残り30%は自分で直す or 次回フィードバック


    最初から100%を求めると、誰にも任せられなくなる


    任せるの苦手な人、70%ルール試してみて

    '
  status: posted
  posted_at: '2026-01-16T21:15:10.137054+09:00'
  posted_url: https://x.com/i/web/status/2012136540483576111
- id: 100day-day16
  scheduled_at: '2026-01-17T09:00:00+09:00'
  type: 100day_challenge
  day: 16
  title: 会議後のフォローアップメール自動送信
  body: '会議終わった後のフォローアップ、忘れがち


    だから会議後のフォローアップメール自動送信を実装した


    Before: 手動でメール作成（忘れることも多い）

    After: 会議終了後に自動で参加者にサマリー送信


    なぜこれが必要か？

    → 「言った言わない」を撲滅したいから


    会議の価値は、その後のアクションで決まる


    累計: 22個/100個完了

    残り: 84日


    会議後のフォローアップ、どうやってる？

    '
