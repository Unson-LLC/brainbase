- id: fundamental-company-failed
  scheduled_at: '2026-01-13T12:00:00+09:00'
  type: fundamental
  title: 27歳で会社を潰した
  body: '27歳で会社を潰した


    売上ほぼゼロ

    黒字化は夢のまた夢

    借金だけが残った


    「経営」のほんの一部分しか知らずにやってた


    今は違う


    何が変わったか？


    「構造化」という武器を手に入れた


    事業を分解して、仕組みにして、回す

    当たり前のことだけど、当時の俺は知らなかった


    今は4事業を1人で回せてる

    売上も立ってる


    失敗から学んだのは「経営には全体像がある」ということ

    一部だけ頑張っても意味ない


    失敗した経験がある人、その経験は資産だよ

    '
