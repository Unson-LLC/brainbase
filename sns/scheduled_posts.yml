- id: x-20260124-004
  scheduled_at: '2026-01-25T13:00:00+09:00'
  type: x_post
  title: SNSは伸びた
  body: 'SNSは伸びた

    でも売れない


    詰まってたのはメルマガだった


    オープンチャット参加者

    20→27に増えたのは

