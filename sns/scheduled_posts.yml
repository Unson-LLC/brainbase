- id: 100day-day13
  scheduled_at: '2026-01-14T09:00:00+09:00'
  type: 100day_challenge
  day: 13
  title: タスク完了時の自動アーカイブ
  body: '完了したタスクがずっと画面に残ってる


    これ、地味にストレス


    だからタスク完了時の自動アーカイブを実装した


    Before: 手動で「完了」フォルダに移動

    After: 完了したら自動でアーカイブ


    なぜこれが大事か？

    → 「今やるべきこと」だけに集中したいから


    ノイズを減らすのも立派な自動化


    累計: 19個/100個完了

    残り: 87日


    タスク管理のノイズ、気になる派？

    '
  status: posted
  posted_at: '2026-01-14T09:00:00+09:00'
- id: fundamental-3capitals
  scheduled_at: '2026-01-14T12:00:00+09:00'
  type: fundamental
  title: 3つの資本論
  body: '人生には3つの資本がある


    1. 社会資本（つながり・信頼）

    2. 人的資本（スキル・経験）

    3. 金融資本（お金・資産）


    2024年の俺は、1と2に全振りしてた

    種まき、仕組み作り、関係性構築


    2025年は、これを3（金融資本）に転換するフェーズ


    作ったものを価値に変える

    売るための仕組みを動かす


    順番が大事


    いきなり金を稼ごうとしても無理

    まず信頼とスキルを積む

    それが後で金に変わる


    今どの資本を積んでる？

    '
