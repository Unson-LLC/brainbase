- id: 100day-day14
  scheduled_at: '2026-01-15T09:00:00+09:00'
  type: 100day_challenge
  day: 14
  title: タスクテンプレートの自動適用
  body: '「新規プロジェクト立ち上げ」のたびに同じタスクを手動で作ってた


    アホらしい


    だからタスクテンプレートの自動適用を実装した


    Before: 毎回10個のタスクを手動作成（30分）

    After: プロジェクト種別選択→自動生成


    なぜこれが必要か？

    → 「考える」と「作業する」を分離したいから


    テンプレ化できるものは全部テンプレ化する


    累計: 20個/100個完了

    残り: 86日


    テンプレ化してる業務ある？

    '
  status: posted
  posted_at: '2026-01-15T08:36:00+09:00'
  posted_url: https://x.com/i/web/status/2011568865327858086
- id: fundamental-kakugo
  scheduled_at: '2026-01-15T12:00:00+09:00'
  type: fundamental
  title: 覚悟の表明
  body: '売上5億円以下の経営者で

    SNSで「優等生」やってる人


    正直、誰の記憶にも残らない


    無難な発信が生むのは、共感じゃなくて「無関心」


    嫌われる可能性を引き受けて発信して

    はじめて「それでもこの人が好きだ」という人が現れる


    俺は嫌われる覚悟で発信する


    「マネジメントを人間がやる時代、終わらせたい」


    この一言で離れる人もいるだろう

    でもそれでいい


    万人に好かれようとして、誰にも刺さらない

    それが一番つまらない


    覚悟を持って発信してる人、尊敬する

    '
  status: posted
