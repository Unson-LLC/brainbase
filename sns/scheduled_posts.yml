  title: 予定を先に埋めるより判断条件を先に決めるほうが安定する
  body: '予定を先に埋めるより判断条件を先に決めるほうが安定する


    俺の言う判断条件は scheduled するか wait するかを即決する基準のこと


    例えばミーティング返信は criteria が 目的が明確 期限がある 代替がない なら scheduled それ以外は wait


    AIエージェントにマネジメントを渡す実験で criteria を先に書き出し 100日で更新ループを回した


    ひとりで4事業だと人間で全部握るのは痛いので criteria で判断を型化した


    あなたは scheduled の前に criteria を決めてる?'
  image: ''
