  title: 逆だった、判断条件を先に固定しないと運用が崩れる
  body: '逆だった、判断条件を先に固定しないと運用が崩れる


    噂レベルで見てたら、要件だけ増えて止まった


    一人で4事業回しつつ丸投げ実験やってる


    運用を再現するなら、判断条件を先に書くべきだと気づいた


    API一覧と画面遷移図を後回しにしたら、要件くださいが連発で戻した


    100日チャレンジで、判断基準を先に固定したら止まらなくなった


    基準→手順の順にすると、迷いが減って回る


    コメントで教えて'
  image: ''
  sns_smart_completed: true
  status: ready
