- id: fundamental-failure-premise
  scheduled_at: '2026-01-14T21:00:00+09:00'
  type: fundamental
  title: 失敗は前提条件
  body: '「失敗しないように」って考えてる時点で負け


    失敗は前提条件


    100回やって30回成功すればいい

    70回の失敗から学べばいい


    俺は毎日何かしら失敗してる


    今日もコード書いてバグ出した

    昨日は判断ミスで手戻りが発生した


    でも止まらない


    「失敗を避ける」より「失敗から回復する速度」を上げる


    これがAI時代の生存戦略だと思ってる


    完璧主義は捨てろ

    失敗しても死なない


    最近どんな失敗した？

    '
