- id: fundamental-shikumika
  scheduled_at: '2026-01-13T21:00:00+09:00'
  type: fundamental
  title: 仕組み化への執着
  body: '俺は「仕組み化」に執着してる


    同じことを2回やったら、3回目は自動化する


    なぜか？


    「同じ作業を繰り返す自分」が嫌いだから


    人間は創造的なことに時間を使うべき

    ルーティンはAIや仕組みにやらせればいい


    brainbaseを作った理由もこれ


    「事業を構造化して、それを自動化する」

    ここにめちゃくちゃワクワクしてる


    仕組み化の何が楽しいかって

    「自分がいなくても回る」状態を作れること


    社長不在でも会社が回る

    これが理想


    みんなは何を自動化したい？

    '
