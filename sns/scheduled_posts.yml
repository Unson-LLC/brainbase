- id: x-20260227-001
  story_id: story-20260227-001
  story_stage: hook
  scheduled_at: '2026-02-27T07:10:00+09:00'
  type: x_post
  title: SE組織の短期KPI評価を中期成長インセンティブに組み替
  body: '売上が増えてるのに、新規案件の種がなくなった


    4つの事業を1人で回していて、ある日気づいた


    短期売上KPIで数字責任を負うと、営業は絶対に失敗しない案件だけを選ぶんだ


    損失回避の本能だ


    確実な10を取るか、50%の確率で20だが失敗のリスク


    数字責任がある以上、誰もが確実な10を選ぶ


    その結果、新規の種は育たず、確実な案件だけが積まれていく


    短期的には数字が出る


    だが組織全体で見ると、成長の選択肢が消える


    気づいた時点で、既に100日間がその状態だった


    営業の提案が「既存のここ、確実に取れます」という案件ばかり


    失敗の試行も、評価される土壌がない


    だから誰も新しいものを試さない


    それから評価体系を変えた


    中期成長インセンティブにシフト


    失敗も試行として扱う仕組みに


    営業の提案が変わった


    失敗を怖がらない提案が増えた


    試行の数が増えた


    その100日間で失った機会


    売上を計算すればいくら


    成長の積み重ねを見ればどれだけの停滞か


    それが本当に無駄だった


    数字責任と成長責任のズレ


    短期で見えるものばかり最適化していると、長期の選択肢がなくなる'
