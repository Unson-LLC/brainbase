- id: fundamental-why-automation
  scheduled_at: '2026-01-12T17:00:00+09:00'
  type: fundamental
  title: なぜマネジメントを自動化するのか
  body: '暴露するけど、俺がマネジメントを自動化してる本当の理由は経営効率じゃない


    娘が「パパ、今日は遊べる？」って聞いてきた時、「ちょっと待って」って言いたくなかった


    1人で4事業回してると、Slack見て、進捗確認して、タスク振って、ってやってるだけで1日が終わる

    気づいたら21時

    娘はもう寝てる


    「家族のために働いてるのに、家族との時間がない」って矛盾に気づいた時、俺は決めた


    マネジメントの80%をAIに丸投げする


    mana-weeklyってAIエージェントに週次の進捗整理を任せた

    1時間かけてた作業が5分で終わる

    俺は「これでいい？」って聞かれて「いいよ」って答えるだけ


    結果、週5日中4日は18時に仕事を終えられるようになった


    「パパ、今日は遊べる？」に「いいよ」って即答できる


    お前はまだ21時まで働いてんの？

    '
