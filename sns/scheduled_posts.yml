- id: 100day-day12
  scheduled_at: '2026-01-13T09:00:00+09:00'
  type: 100day_challenge
  day: 12
  title: タスク依存関係の可視化
  body: '「これ終わらないと次に進めない」


    この依存関係が見えてないと、チームは詰む


    だからタスク依存関係を可視化した


    Before: 頭の中で管理（属人化の極み）

    After: 依存グラフが自動生成


    なぜこれが必要か？

    → 俺がボトルネックになりたくないから


    「担当者に聞かないとわからない」を撲滅する


    累計: 18個/100個完了

    残り: 88日


    チームで依存関係どう管理してる？

    '
