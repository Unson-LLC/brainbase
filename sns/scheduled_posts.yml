- id: fundamental-big-picture
  scheduled_at: '2026-01-18T12:00:00+09:00'
  type: fundamental
  title: 経営の全体像を見ること
  body: '経営って、部分最適の罠に陥りやすい


    「開発頑張ってます」

    「営業頑張ってます」

    「採用頑張ってます」


    でも、全体として機能してる？


    俺は去年、この罠にハマってた


    ミーティング、ミーティング、ミーティング

    開発、開発、開発


    でも売上が思ったほど伸びない


    なぜか？

    「売る仕組み」が弱かったから


    今年は全体を見る


    人・金・情報・時間・仕組み

    どこが弱いか、常にチェックする


    部分最適に陥ってない？

    '
  status: posted
  posted_at: '2026-01-18T11:54:07.372176+09:00'
  posted_url: https://x.com/i/web/status/2012720123321413663
- id: fundamental-philosophy
  scheduled_at: '2026-01-18T21:00:00+09:00'
  type: fundamental
  title: 哲学的視点の重要性
  body: 'AIの進化がヤバい


    技術の話じゃなくて、「人間とは何か」という話


    AIが仕事を奪う？

    AIが創作する？

    AIが判断する？


    これ、技術の問題じゃなくて、哲学の問題


    「人間にしかできないこと」は何か？

    「人間がやるべきこと」は何か？


    俺は2026年、ここを深く考えたい


    AIツールの使い方より、もっと根本的な問い


    「AIと共存する人間」として、どう生きるか


    哲学的なこと、考えてる人いる？

    '
  status: posted
  posted_at: '2026-01-18T21:14:19.064620+09:00'
  posted_url: https://x.com/i/web/status/2012861101772554482
