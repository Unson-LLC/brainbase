  scheduled_at: '2026-01-25T10:00:00+09:00'
  type: x_post
  title: AI入れると楽になる
  body: 'AI入れると楽になる

    って思ってたのに

    導入初日に承認が止まった


    誰が最終判断するか決まってなくて

    Slackが5往復して詰む


    だから俺は

    紙に1行だけ書く

    経理の月次締めを2日縮める


    この1行がないと

    現場は軽くならない'
