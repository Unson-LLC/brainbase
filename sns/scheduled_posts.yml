  day: 11
  title: デッドライン通知の自動化
  body: '俺は娘との夕食の時間を死守したい


    Day 11: デッドライン通知の自動化


    きっかけは「パパまだ？」って言われた時


    毎日カレンダーを3回チェックしてた（15分/日）

    → GASでSlackに前日18時と当日9時に自動通知


    たった15分だけど、17:45に家を出れるかどうかはここで決まる


    娘と「いただきます」を言える日が増えた


    累計: 11個/100個完了

    明日はDay 12、Google Driveの自動整理に挑戦

    '
