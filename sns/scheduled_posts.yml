- id: fundamental-structuring
  scheduled_at: '2026-01-17T12:00:00+09:00'
  type: fundamental
  title: 構造化という武器
  body: '俺の最大の武器は「構造化」


    複雑なものを分解して、シンプルな要素に落とす

    それを組み合わせて、仕組みにする


    27歳で会社を潰した時、これができなかった

    「経営」が一枚岩に見えてた


    今は違う


    経営 = 人 × 金 × 情報 × 時間 × 仕組み


    それぞれを分解して、最適化する


    構造化できると、複雑な問題が解けるようになる


    「なんか難しい」は、分解が足りてない証拠


    構造化、意識してやってる人いる？

    '
  status: posted
  posted_at: '2026-01-17T11:41:15.311696+09:00'
  posted_url: https://x.com/i/web/status/2012354498233250173
- id: fundamental-ai-human-role
  scheduled_at: '2026-01-17T21:00:00+09:00'
  type: fundamental
  title: AIと人間の役割分担
  body: 'AIに任せること、人間がやること


    この切り分けが重要


    AIに任せる:

    - 情報収集・整理

    - ルーティン作業

    - 文章の下書き

    - スケジュール管理


    人間がやる:

    - 最終判断

    - 関係性構築

    - 創造的な発想

    - 責任を取る


    「AIに全部任せる」は危険

    「AIは使わない」は時代遅れ


    バランスが大事


    俺は80%をAIに任せて、20%に集中する

    その20%こそが、人間の価値


    みんなはどこで線引きしてる？

    '
  status: posted
  posted_at: '2026-01-17T21:13:39.154700+09:00'
  posted_url: https://x.com/i/web/status/2012498546529067096
- id: 100day-day17
  scheduled_at: '2026-01-18T09:00:00+09:00'
  type: 100day_challenge
  day: 17
  title: 定例会議の日程自動調整
  body: '定例会議の日程調整、毎週やるのがダルい


    だから定例会議の日程自動調整を実装した


    Before: 参加者に個別連絡して調整（30分/週）

    After: 全員のカレンダーを自動チェック→空き時間に自動設定


    なぜこれが必要か？

    → 「調整」に脳のリソースを使いたくないから


    日程調整は人間がやる仕事じゃない


    累計: 23個/100個完了

    残り: 83日


    日程調整、まだ手動でやってる？

    '
