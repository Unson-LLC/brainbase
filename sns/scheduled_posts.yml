  title: 74件のレビューを一気に診断すれば速いと信じてた
  body: '74件のレビューを一気に診断すれば速いと信じてた


    でも裏切られた


    影響モジュール単位で順番を分けたら詰まりがほどけた


    ひとりで4事業を回すと判断条件が揺れるだけで止まる


    一括対応は捨てた 短期の気持ちよさより遅延が痛かった


    だから先に判定ルールを型にした 例は影響が広いモジュールを先に回す


    AIエージェントに丸投げ実験中の自分にはこの方が安定する感じ


    分割してから待ち行列が消えた


    分割の順番テンプレは迷いを減らす'
