  title: 74件の診断を一括で投げれば速いと信じてた
  body: '74件の診断を一括で投げれば速いと信じてた


    AIが詰まって3倍の時間を溶かした


    ひとりで4事業回す身には死活問題


    変更範囲で分割して順次診断に切り替えたら捨てる作業が消えた


    判断の根拠はテンプレートで先に縛る


    迷う時間も溶かしたくないから


    AIエージェント丸投げ実験の進捗を週次で公開してる'
