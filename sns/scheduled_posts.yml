- id: fundamental-decision-making
  scheduled_at: '2026-01-12T21:00:00+09:00'
  type: fundamental
  title: 意思決定は「えいや」で決める行為
  body: '意思決定って「正解を見つける行為」だと思ってた


    でも違った


    情報が足りない

    選択肢も曖昧

    リスクもある


    その中で「えいや」で決める行為そのもの


    だから失敗は前提条件

    絶対正しい選択なんて存在しない


    あるのは「決めたことを正解にする覚悟」だけ


    みんなはどう決めてる？

    '
