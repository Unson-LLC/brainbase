name: Skills Auto-Optimization via KERNEL

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜 00:00 UTC
  workflow_dispatch:  # 手動実行
    inputs:
      skills:
        description: 'Comma-separated list of skills to evaluate (leave empty for all)'
        required: false
        default: ''
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.claude/skills/**'
      - 'server/services/skills-evaluation-service.js'
      - 'scripts/evaluate-skills-kernel.js'

jobs:
  kernel-evaluation:
    name: Evaluate Skills Against KERNEL Principles
    runs-on: [self-hosted, local]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Claude Code environment
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding": true}' > ~/.claude.json

      - name: Run KERNEL Evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "🔍 Starting KERNEL 6-Principle Evaluation..."

          if [ -n "${{ github.event.inputs.skills }}" ]; then
            echo "Evaluating specific skills: ${{ github.event.inputs.skills }}"
            node scripts/evaluate-skills-kernel.js \
              --skills="${{ github.event.inputs.skills }}" \
              --output=/tmp/evaluation-results.json
          else
            echo "Evaluating all skills..."
            node scripts/evaluate-skills-kernel.js \
              --output=/tmp/evaluation-results.json
          fi

          if [ $? -eq 0 ]; then
            echo "✅ KERNEL evaluation completed"
          else
            echo "⚠️ KERNEL evaluation finished with warnings"
            exit 0  # Non-blocking
          fi

      - name: Generate Optimization Report
        run: |
          echo "📋 Generating optimization recommendations..."
          node scripts/generate-optimization-report.js \
            --input=/tmp/evaluation-results.json \
            --output=/tmp/skills-optimization-report.md

      - name: Upload Evaluation Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skills-evaluation-results-${{ github.run_number }}
          path: |
            /tmp/evaluation-results.json
            /tmp/skills-optimization-report.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/skills-optimization-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## KERNEL Evaluation Results\n\n${report}`
            });

      - name: Create Issue for High-Risk Skills
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            try {
              const results = JSON.parse(fs.readFileSync('/tmp/evaluation-results.json', 'utf8'));
              const highRisk = results.filter(s => s.kernelScore < 0.5);

              if (highRisk.length > 0) {
                const body = `## 🔴 High-Risk Skills Detected\n\n` +
                  `${highRisk.length} skill(s) require immediate attention:\n\n` +
                  highRisk.map(s => `- **${s.skillName}**: ${(s.kernelScore * 100).toFixed(1)}% KERNEL score`).join('\n') +
                  `\n\n---\n\n` +
                  `**Recommended Actions**:\n` +
                  `1. Review the full evaluation report in [workflow artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n` +
                  `2. Prioritize comprehensive rewrite for skills below 50%\n` +
                  `3. Validate against KERNEL 6 principles in [docs/KERNEL-PRINCIPLES.md](./docs/KERNEL-PRINCIPLES.md)\n`;

                github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[Auto] Skills Optimization Required (${highRisk.length} skills)`,
                  body: body,
                  labels: ['skills-optimization', 'auto-generated', 'high-priority']
                });
              } else {
                console.log('✅ No high-risk skills detected');
              }
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }
