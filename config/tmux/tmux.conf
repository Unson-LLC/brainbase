set-option -g mouse on

# Show workspace context (cwd + agent session ids) in the status bar.
# NOTE: BRAINBASE_SESSION_ID / CODEX_THREAD_ID / CLAUDE_*_SESSION_ID are
#       per-session values set by login_script.sh / hooks, NOT inherited from
#       the attaching client. Do NOT put them in update-environment, or tmux
#       will overwrite (clear) them on re-attach.

# Make room for long paths / UUIDs.
set -g status-right-length 200

# Right side: current pane cwd + session ids (if present) + clock.
# tmux formats do not directly expose session environment variables, so we use
# a small helper that reads them via `tmux show-environment -t <session> ...`.
set -g status-right "server:#(/Users/ksato/.tmux/status-env --max 20 #{session_name} BRAINBASE_SERVER_PATH) | branch:#(/Users/ksato/.tmux/status-git-branch --max 30 #{session_name}) | cwd:#{=/-30/...:pane_current_path} | bb:#(/Users/ksato/.tmux/status-env #{session_name} BRAINBASE_SESSION_ID) | codex:#(/Users/ksato/.tmux/status-codex-session --max 8 #{session_name}) | claude:#(/Users/ksato/.tmux/status-claude-session --max 8 #{session_name}) | %Y-%m-%d %H:%M"

# コピー時に改行をスペースに変換（URLの連結に便利）
# Ctrl+Space でコピーモード → 選択 → Enter でクリップボード（改行→スペース変換）
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tr -d '\n' | pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tr -d '\n' | pbcopy"

# URL専用コピー：prefix + y でURL抽出してクリップボード
bind-key y run-shell "~/.tmux/extract-url.sh"

# fzfでURL選択してコピー：prefix + u
bind-key u run-shell "~/.tmux/fzf-url-copy.sh"

# ファイルパス専用コピー：prefix + p
bind-key p run-shell "~/.tmux/fzf-path-copy.sh"

# 汎用改行削除コピー：prefix + c
bind-key c run-shell "~/.tmux/remove-newlines-copy.sh"
